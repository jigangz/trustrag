[project]
name = "trustrag-eval"
version = "0.1.0"
description = "RAGAS-based evaluation pipeline with trust-specific metrics for TrustRAG"
authors = [{ name = "Jigang Zhou", email = "zjg0907008@gmail.com" }]
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "ragas>=0.2",
    "datasets>=2.14",
    "httpx>=0.27",
    "pandas>=2.0",
]

[project.urls]
Homepage = "https://github.com/jigangz/TrustRAG"
Repository = "https://github.com/jigangz/TrustRAG"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trustrag_eval"]
